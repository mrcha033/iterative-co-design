# Common model targets
model_registry:
  general: "src.models.wrapper.ModelWrapper"
  

# Profiler configuration
profiler:
  _target_: "src.utils.profiler.LatencyProfiler"
  cache_dir: "${hydra:runtime.output_dir}/profiler_cache"
  ncu_metrics: ["sm__cycles_elapsed.avg", "l1tex__t_sectors_pipe_lsu_mem_global_op_ld.sum"]

# Wandb configuration
wandb:
  _target_: "src.utils.logging.initialize_wandb"
  project: ${project_name}
  mode: "offline"  # Set to offline by default
  
# Debug preset
debug:
  dataset:
    max_samples: 100
  training:
    max_steps: 10
    batch_size: 4

# Storage management
storage:
  max_checkpoints_to_keep: 5
  cleanup_older_than_days: 30 
