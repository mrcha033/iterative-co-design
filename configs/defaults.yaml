# Default shared configurations
wandb:
  mode: "online"  # Default to online logging; override with +wandb.mode=offline for local
  project: "iterative-co-design"  # Must match project_name in config.yaml
  log: ${oc.env:WANDB_LOG,false} # Opt-in via environment variable
  entity: "mrcha033-yonsei-university"
  run_name: "${method}-${model.name}-${dataset.name}"

storage:
  cleanup_older_than_days: 30  # Cleanup runs older than this

# Enable experiment mode for faster testing
experiment: null  # Set to "debug" for quick runs 

# Hardware-Native Differentiable Sparsity (HDS) Configuration
hds:
  # Wildcard patterns for layers whose hidden dimension equals d_model.
  # These names cover
  # • Mamba:  *.mixer.*_proj, *.mlp.*_proj, *.in_proj, *.out_proj
  # • BERT :  *.attention.*, *.intermediate.dense, *.output.dense
  # 추가 모델은 개별 model YAML 에서 `hds.target_layers` 로 덮어쓰기 가능.
  target_layers:
    - "*.mixer.*_proj"
    - "*.mlp.*_proj"
    - "*.in_proj"
    - "*.out_proj"
    - "*.attention.*dense*"
    - "*.intermediate.dense"
    - "*.output.dense"
  n: 2                    # Keep 2 out of every M weights (N:M sparsity)
  m: 4                    # Block size for N:M sparsity
  fine_tuning_epochs: 1   # Number of epochs to fine-tune sparsity masks
  gumbel_temp: 1.0        # Temperature for Gumbel-Top-K sampling
  
  # Layout-aware regularization (for bidirectional co-design)
  layout_aware_lambda: 0.01 # Strength of the regularization
  penalty_fn: "inverse"     # Penalty function type ('inverse' or 'exp')

# IO-Aware Scan Permutation (IASP) Configuration
iasp:
  # Target layer name for activation correlation analysis.
  # This is model-specific and should be overridden in model configs.
  target_layer_name: null
  
  # Range of cluster sizes to search for optimal permutation.
  # This is also model-specific.
  cluster_size_range: [16, 128]
  
  # Number of samples to collect for correlation analysis.
  max_samples: 4096
  
  # Spectral clustering parameters
  spectral_n_init: 10
  spectral_random_state: 0