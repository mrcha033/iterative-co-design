# Mamba-370M Model Configuration
name: "state-spaces/mamba-370m-hf"
vocab_size: 50280
hidden_size: 1024
task: "language_modeling"

# IASP Configuration
iasp:
  # Use multiple representative layers spread across the depth so that
  # activation correlations capture global structure, leading to better
  # cache-aware permutations.
  target_layer_names:
    - "model.backbone.layers.0.mixer.x_proj"
    - "model.backbone.layers.8.mixer.x_proj"
    - "model.backbone.layers.16.mixer.x_proj"
    - "model.backbone.layers.32.mixer.x_proj"
    - "model.backbone.layers.47.mixer.x_proj"
  cluster_size_range: [16, 128] 