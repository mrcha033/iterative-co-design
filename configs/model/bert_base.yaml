# BERT-base Model Configuration
name: "google-bert/bert-base-uncased"
type: "bert"
vocab_size: 30522
hidden_size: 768 # d_model
task: "sequence_classification"

# IASP Configuration
iasp:
  # Target the intermediate FFN layers for IASP.
  # The permutation will be calculated from the first matched layer and applied to all.
  target_layers: "bert.encoder.layer.*.intermediate.dense"
  cluster_size_range: [64, 256] 
  max_samples: 4096 # Use a reasonable number of samples

hds:
  # Focus HDS on the second FFN layer (down-projection).
  # Its input is the d_ffn dimension, allowing HDS to apply sparsity
  # to the same space that IASP permutes.
  target_layers:
    - "bert.encoder.layer.*.output.dense"
  n: 2
  m: 4
  fine_tuning_epochs: 1
