# BERT-base Model Configuration
name: "google-bert/bert-base-uncased"
vocab_size: 30522
hidden_size: 768
task: "sequence_classification"

# IASP Configuration
iasp:
  # Target all attention output layers and FFN output layers
  target_layer_names: "bert.encoder.layer.*.output.dense"
  cluster_size_range: [16, 64] # Smaller clusters for BERT
  num_samples: 128

hds:
  target_layers:
    - "bert.encoder.layer.*.attention.output.dense"
    - "bert.encoder.layer.*.intermediate.dense"
    - "bert.encoder.layer.*.output.dense"
  n: 2
  m: 4
  fine_tuning_epochs: 1
