# Mamba-370M Model Configuration
name: "state-spaces/mamba-370m-hf"
type: "mamba"
vocab_size: 50280
hidden_size: 1024
task: "language_modeling"
d_inner: 2048

# IASP Configuration
iasp:
  # Use layers that operate on full hidden dimension (1024), not state space dimension (96)
  # in_proj: (4096, 1024) - operates on full hidden dim
  # out_proj: (1024, 2048) - operates on full hidden dim  
  target_layer_names: "backbone.layers.*.mixer.in_proj"
  cluster_size_range: [64, 256]
  max_samples: 65536
  sample_stride: 4
  knn_k: 128
  spectral_n_init: 10
  spectral_random_state: 42

hds:
  target_layers:
    - "backbone.layers.*.mixer.in_proj"
    - "backbone.layers.*.mixer.out_proj"
    - "backbone.layers.*.mixer.conv1d"
    - "backbone.layers.*.mixer.dt_proj"
  n: 2
  m: 4
  fine_tuning_epochs: 1
  learning_rate: 0.0001
