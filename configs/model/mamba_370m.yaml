# Mamba-370M Model Configuration
name: "state-spaces/mamba-370m-hf"
type: "mamba"
vocab_size: 50280
hidden_size: 1024
task: "language_modeling"
d_inner: 2048

# IASP Configuration
iasp:
  # Wildcard pattern for layers to apply IASP.
  # For Mamba, we target the main input projection.
  target_layers: 
    - "backbone.layers.*.mixer.in_proj"
  cluster_size_range: [64, 256]
  max_samples: 8192
  sample_stride: 1
  knn_k: 128
  spectral_n_init: 10
  spectral_random_state: 42

hds:
  target_layers:
    - "backbone.layers.*.mixer.in_proj"
    - "backbone.layers.*.mixer.out_proj"
    - "backbone.layers.*.mixer.conv1d"
    - "backbone.layers.*.mixer.dt_proj"
  n: 2
  m: 4
  fine_tuning_epochs: 1
  learning_rate: 0.0001
