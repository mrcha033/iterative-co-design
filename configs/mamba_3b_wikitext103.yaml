# Configuration for Mamba-3B on WikiText-103
model_name: "state-spaces/mamba-2.8b-slimpj" # Using a Mamba variant available on HF
task: "language_modeling"
dataset_name: "wikitext"
dataset_config: "wikitext-103-raw-v1"
text_column: "text" # The column in the dataset containing the text

# --- Experiment Parameters ---
# For IASP
iasp:
  target_layer_name: "model.layers.0" # Example: target the first layer
  n_clusters: 64 # Example cluster count

# For HDS (to be used later)
hds:
  sparsity_target: 0.5

# --- General Parameters ---
batch_size: 4
sample_size: 16 # Number of samples to use for perplexity/correlation
vocab_size: 50280 # From mamba-2.8b-slimpj tokenizer_config.json

