# Model and Task Configuration
model_name: "bert-base-uncased"
task: "sequence_classification"
vocab_size: 30522 # Vocabulary size for bert-base-uncased

# Dataset Configuration
dataset_name: "glue"
dataset_config: "sst2"
text_column: "sentence"
sample_size: 50 # Number of samples for correlation/evaluation

# Training/Optimization Hyperparameters
batch_size: 16
learning_rate: 2.0e-5
num_iterations: 2 # For the iterative method

# IASP Configuration
iasp:
  target_layer_name: "bert.encoder.layer.11.output.dense"
  n_clusters: 12 # BERT-base's attention heads

# HDS Configuration (if applicable)
hds:
  sparsity_target: 0.5 # 50% sparsity
  fine_tuning_epochs: 3 