services:
  # Base service - uses pre-built image from Docker Hub
  base:
    image: mrcha033/iterative-co-design:latest
    command: echo "🐳 Using pre-built image from Docker Hub - Environment ready!"

  # Trainer service - runs BERT experiments
  trainer:
    image: mrcha033/iterative-co-design:latest
    command: python scripts/run_experiment.py model=bert_base dataset=sst2 method=dense dry_run=true
    volumes:
      - .:/workspace
      - ./outputs:/workspace/outputs
      - ./results:/workspace/results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0

  # Mamba trainer (stable with pre-built wheel)
  mamba-trainer:
    image: mrcha033/iterative-co-design:latest
    command: python scripts/run_experiment.py model=mamba_3b dataset=wikitext103 method=dense dry_run=true
    volumes:
      - .:/workspace
      - ./outputs:/workspace/outputs
      - ./results:/workspace/results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0

  # Interactive shell
  shell:
    image: mrcha033/iterative-co-design:latest
    command: /bin/bash
    volumes:
      - .:/workspace
      - ./outputs:/workspace/outputs
      - ./results:/workspace/results
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all

  # Jupyter notebook service
  jupyter:
    image: mrcha033/iterative-co-design:latest
    command: >
      bash -c "
      pip install jupyter notebook ipykernel &&
      jupyter notebook --ip 0.0.0.0 --port 8888 --no-browser --allow-root --NotebookApp.token=''
      "
    volumes:
      - .:/workspace
      - ./notebooks:/workspace/notebooks
    ports:
      - "8888:8888"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all 