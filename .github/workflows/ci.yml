name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff isort mypy
    
    - name: Run black
      run: black --check src/ tests/ scripts/
    
    - name: Run isort
      run: isort --check-only src/ tests/ scripts/
    
    - name: Run ruff
      run: ruff check src/ tests/ scripts/
    
    - name: Run mypy
      run: mypy src/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
    
    - name: Run unit tests
      run: pytest tests/unit/ -v --cov=src --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: docker build -t iterative-co-design:test .
    
    - name: Test Docker image
      run: |
        docker run --rm iterative-co-design:test python -c "
        import torch
        import numpy as np
        import sklearn
        print('PyTorch version:', torch.__version__)
        print('NumPy version:', np.__version__)
        print('scikit-learn version:', sklearn.__version__)
        print('CUDA available:', torch.cuda.is_available())
        print('Docker environment test passed!')
        "