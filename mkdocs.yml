site_name: Iterative Co-Design
theme:
  name: material
  palette:
    # Palette toggle for light vs dark mode
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode
    - scheme: slate 
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_root_toc_entry: true

nav:
  - 'Home': 'index.md'
  - 'API Reference':
    - 'Co-Design Algorithms': 'api/co_design.md'
    - 'Models': 'api/models.md'
    - 'Utilities': 'api/utils.md' 