services:
  base:
    build:
      context: .
      dockerfile: Dockerfile
    image: co-design-base

  trainer:
    image: co-design-base
    command: python scripts/run_experiment.py model=mamba_3b dataset=wikitext103 method=iterative
    volumes:
      - .:/workspace
    # Enable GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  jupyter:
    image: co-design-base
    command: jupyter notebook --ip 0.0.0.0 --port 8888 --no-browser --allow-root
    volumes:
      - .:/workspace
    ports:
      - "8888:8888" 