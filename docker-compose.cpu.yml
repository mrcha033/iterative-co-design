services:
  # Base service - uses pre-built image from Docker Hub (CPU only)
  base:
    image: mrcha033/iterative-co-design:latest
    command: echo "🐳 Pre-built image from Docker Hub ready! (CPU mode)"

  # Trainer service - runs BERT experiments (CPU only)
  trainer:
    image: mrcha033/iterative-co-design:latest
    command: python scripts/run_experiment.py model=bert_base dataset=sst2 method=dense dry_run=true
    volumes:
      - .:/workspace
      - ./outputs:/workspace/outputs
      - ./results:/workspace/results
    environment:
      - CUDA_VISIBLE_DEVICES=""

  # BERT complete experiment suite (CPU only)
  bert-all-train:
    image: mrcha033/iterative-co-design:latest
    command: >
      bash -c "
      echo '🚀 Starting BERT complete experiment suite (CPU mode)...' &&
      echo '📊 Experiment 1/5: Dense baseline' &&
      python scripts/run_experiment.py model=bert_base dataset=sst2 method=dense &&
      echo '📊 Experiment 2/5: Permute only' &&
      python scripts/run_experiment.py model=bert_base dataset=sst2 method=permute_only &&
      echo '📊 Experiment 3/5: Sparsity only' &&
      python scripts/run_experiment.py model=bert_base dataset=sst2 method=sparsity_only &&
      echo '📊 Experiment 4/5: Linear pipeline' &&
      python scripts/run_experiment.py model=bert_base dataset=sst2 method=linear_pipeline &&
      echo '📊 Experiment 5/5: Iterative co-design' &&
      python scripts/run_experiment.py model=bert_base dataset=sst2 method=iterative &&
      echo '✅ All BERT experiments completed! Check outputs/ and results/ directories.'
      "
    volumes:
      - .:/workspace
      - ./outputs:/workspace/outputs
      - ./results:/workspace/results
    environment:
      - CUDA_VISIBLE_DEVICES=""

  # Interactive shell (CPU only)
  shell:
    image: mrcha033/iterative-co-design:latest
    command: /bin/bash
    volumes:
      - .:/workspace
      - ./outputs:/workspace/outputs
      - ./results:/workspace/results
    stdin_open: true
    tty: true
    environment:
      - CUDA_VISIBLE_DEVICES=""

  # Enhanced Jupyter notebook with visualization tools (CPU only)
  jupyter:
    image: mrcha033/iterative-co-design:latest
    command: >
      bash -c "
      echo '📦 Installing enhanced Jupyter environment (CPU mode)...' &&
      pip install --no-cache-dir \
        jupyter \
        jupyterlab \
        notebook \
        ipykernel \
        tensorboard \
        matplotlib \
        seaborn \
        plotly \
        bokeh \
        altair \
        ipywidgets \
        tqdm \
        pandas-profiling \
        ydata-profiling &&
      echo '🚀 Starting Jupyter Lab with TensorBoard support (CPU mode)...' &&
      jupyter lab --ip 0.0.0.0 --port 8888 --no-browser --allow-root \
        --ServerApp.token='' --ServerApp.password='' \
        --ServerApp.allow_origin='*' --ServerApp.allow_remote_access=True
      "
    volumes:
      - .:/workspace
      - ./notebooks:/workspace/notebooks
      - ./outputs:/workspace/outputs
      - ./results:/workspace/results
    ports:
      - "8888:8888"
      - "6006:6006"  # TensorBoard port
    environment:
      - CUDA_VISIBLE_DEVICES=""

  # TensorBoard service for experiment monitoring (CPU only)
  tensorboard:
    image: mrcha033/iterative-co-design:latest
    command: >
      bash -c "
      pip install tensorboard &&
      tensorboard --logdir=./outputs --host=0.0.0.0 --port=6006 --reload_interval=30
      "
    volumes:
      - ./outputs:/workspace/outputs
      - ./results:/workspace/results
    ports:
      - "6007:6006"
    environment:
      - CUDA_VISIBLE_DEVICES="" 