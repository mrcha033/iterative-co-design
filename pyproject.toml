[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "iterative-co-design"
version = "0.1.0"
description = "Iterative Co-Design of Sparsity and Permutation Structures for Hardware-Accelerated Inference"
authors = [{name = "Research Team"}]
requires-python = ">=3.8"
dependencies = [
    "transformers>=4.38.2",
    "datasets>=2.18.0",
    "pyyaml>=6.0.1",
    "numpy>=1.26.4",
    "scikit-learn>=1.4.1",
    "pandas>=2.2.1",
    "tqdm>=4.66.2",
    "hydra-core>=1.3.2",
    "omegaconf>=2.3.0",
    "wandb>=0.16.4",
    "matplotlib>=3.8.3",
    "seaborn>=0.13.2",
    "torch>=2.3.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0.2",
    "pytest-cov",
]
docs = [
    "mkdocs>=1.5.3",
    "mkdocs-material>=9.5.13",
    "mkdocstrings[python]>=0.24.1",
]
dev = [
    "ruff>=0.2.2",
    "iterative-co-design[test,docs]",
]

[tool.setuptools]
packages = ["co_design", "models", "utils"]
package-dir = {"" = "src"}

[tool.setuptools.package-data]
"*" = ["*.yaml", "*.yml"]

[tool.pytest.ini_options]
# Test discovery configuration
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# Add src to Python path for imports
pythonpath = ["src"]

# Ignore directories that shouldn't be treated as test collections
norecursedirs = [
    ".git",
    ".tox", 
    "dist",
    "build",
    "*.egg",
    "scripts",
    "docs", 
    "notebooks",
    "configs",
    "data",
    "results",
    "outputs",
    "figures"
]

# Ignore specific files that contain "test" but aren't test files
ignore_glob = [
    "scripts/run_quant_test.py",
    "scripts/*test*.py"
]

# Output configuration
addopts = [
    "-v",
    "--tb=short", 
    "--strict-markers",
    "--disable-warnings",
    "--color=yes"
]

# Markers for different test types
markers = [
    "unit: Unit tests",
    "integration: Integration tests", 
    "slow: Slow tests that take more than a few seconds",
    "gpu: Tests that require GPU"
]

[tool.ruff]
# Same as Black.
line-length = 88
indent-width = 4

# Assume Python 3.8+
target-version = "py38"

# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

[tool.ruff.lint]
# Enable Pyflakes (`F`) and a subset of the pycodestyle (`E`)  codes by default.
# Unlike Flake8, Ruff doesn't enable pycodestyle warnings (`W`) or
# McCabe complexity (`C901`) by default.
select = ["E4", "E7", "E9", "F"]
ignore = []

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto" 