name: co-design
channels:
  - pytorch
  - nvidia
  - huggingface
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch::pytorch
  - pytorch::torchvision
  - pytorch::torchaudio
  - pytorch::pytorch-cuda=11.8
  # The rest of the packages will be handled by requirements.txt
  # Keeping core ones that might have heavy non-python deps
  - numpy
  - pandas
  - scikit-learn
 