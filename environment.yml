name: iterative-co-design
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10.13
  - cudatoolkit=11.8
  - cudnn=8.7.0
  
  # Core ML/AI dependencies
  - pytorch=2.1.2
  - torchvision=0.16.2
  - torchaudio=2.1.2
  - scikit-learn=1.5.0
  - numpy=1.24.3
  - pandas=2.0.3
  
  # Configuration management
  - pyyaml=6.0.1
  
  # Data processing
  - transformers=4.35.0
  
  # Plotting and visualization
  - matplotlib=3.7.2
  - seaborn=0.12.2
  
  # Profiling and benchmarking
  - psutil=5.9.6
  
  # Testing
  - pytest=7.4.2
  - pytest-cov=4.1.0
  
  # Code quality
  - black=23.9.1
  - isort=5.12.0
  
  # Utilities
  - tqdm=4.66.1
  - click=8.1.7
  
  # pip dependencies (not available in conda)
  - pip
  - pip:
    - hydra-core==1.3.2
    - omegaconf==2.3.0
    - datasets==2.14.5
    - tokenizers==0.14.1
    - torch-geometric==2.4.0
    - ogb==1.3.6
    - nvidia-ml-py==12.535.108
    - pytest-mock==3.11.1
    - ruff==0.0.292
    - mypy==1.5.1
    - rich==13.6.0